<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Chrome</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <header id="header" role="banner">
      <p id="status" class="status-disconnected" role="status" aria-live="polite">Non connecté</p>
      <div id="provider-section" aria-label="Fournisseurs IA">
        <div id="provider-tabs" role="tablist">
          <button class="provider-tab active" data-tab="free" role="tab" aria-selected="true">
            🟢 Gratuit / Open
          </button>
          <button class="provider-tab" data-tab="paid" role="tab" aria-selected="false">
            💳 API Payantes
          </button>
        </div>

        <div id="provider-groups">
          <div class="provider-group active" data-group="free">
            <label for="free-provider">Modèle gratuit :</label>
            <select id="free-provider" aria-label="Fournisseur gratuit">
              <optgroup label="Local (100% gratuit)">
                <option value="local-ollama">Ollama (Local)</option>
                <option value="local-lmstudio">LM Studio</option>
                <option value="local-vllm">vLLM</option>
              </optgroup>

              <optgroup label="Google">
                <option value="gemini-free">Gemini Free</option>
              </optgroup>

              <optgroup label="Qwen">
                <option value="qwen-2.5-coder">Qwen 2.5 Coder</option>
              </optgroup>

              <optgroup label="DeepSeek">
                <option value="deepseek-coder">DeepSeek Coder</option>
                <option value="deepseek-v3.2">DeepSeek V3.2</option>
              </optgroup>

              <optgroup label="Mistral Open">
                <option value="mistral-small">Mistral Small</option>
              </optgroup>

              <optgroup label="Groq (Free tier)">
                <option value="groq-llama">Groq LLaMA</option>
              </optgroup>
            </select>
          </div>

          <div class="provider-group hidden" data-group="paid">
            <label for="paid-provider">Modèle payant :</label>
            <select id="paid-provider" aria-label="Fournisseur payant">
              <optgroup label="OpenAI">
                <option value="gpt-4o">GPT-4o (Code)</option>
                <option value="gpt-4.1">GPT-4.1</option>
                <option value="gpt-deep-research">GPT Deep Research</option>
              </optgroup>

              <optgroup label="Anthropic">
                <option value="claude-sonnet">Claude Sonnet</option>
                <option value="claude-opus">Claude Opus</option>
              </optgroup>

              <optgroup label="Google">
                <option value="gemini-pro">Gemini Pro</option>
              </optgroup>

              <optgroup label="Mistral">
                <option value="mistral-large">Mistral Large</option>
                <option value="magistral">Magistral</option>
              </optgroup>

              <optgroup label="Perplexity">
                <option value="perplexity-pro">Perplexity Pro</option>
                <option value="perplexity-deep-research">Perplexity Deep Research</option>
              </optgroup>

              <optgroup label="xAI - Grok">
                <option value="grok-reasoning">Grok Reasoning</option>
              </optgroup>

              <optgroup label="K2">
                <option value="k2.5">K2.5</option>
              </optgroup>

              <optgroup label="Together.ai">
                <option value="together-mixtral">Mixtral (Together)</option>
              </optgroup>
            </select>
          </div>
        </div>
      </div>
    </header>

    <aside id="settings-panel" class="hidden" aria-label="Paramètres">
      <div class="settings-content">
        <header class="settings-header">
          <h3 id="settings-title">Paramètres Claude</h3>
          <button id="close-settings" class="close-btn" aria-label="Fermer les paramètres">×</button>
        </header>
        <label for="api-key">Clé API :</label>
        <input type="password" id="api-key" placeholder="Saisir la clé API...">
        <div class="settings-footer">
          <button id="save-settings">Enregistrer</button>
          <p class="help-text" id="api-key-help">Obtenez votre clé API depuis la <a href="https://console.anthropic.com/" target="_blank" rel="noopener noreferrer">console Anthropic</a></p>
        </div>
      </div>
    </aside>

    <main id="chat-container" role="main">
      <section id="messages" aria-label="Conversation"></section>
    </main>

    <footer id="input-container">
      <div id="assistant-controls" aria-label="Options assistant">
        <button id="mode-btn" type="button">Mode: Edit</button>
        <label class="toggle-option">
          <input id="refactor-only" type="checkbox">
          Refactor only
        </label>
        <div id="scope-selector" aria-label="Scopes de modification">
          <label><input type="checkbox" value="html" checked>HTML</label>
          <label><input type="checkbox" value="css" checked>CSS</label>
          <label><input type="checkbox" value="js" checked>JS</label>
        </div>
      </div>
      <textarea
        id="user-input"
        placeholder="Demandez-moi de lire ou modifier le code CodePen..."
        rows="3"
      ></textarea>
      <div id="input-actions">
        <button id="settings-btn" title="Paramètres" aria-label="Ouvrir les paramètres">⚙️</button>
        <button id="send-btn">Envoyer</button>
      </div>
    </footer>
  </div>

  <script src="js/diff.min.js"></script>
  <script src="js/marked.min.js"></script>
  <script src="js/purify.min.js"></script>
  <script src="js/agents/Agent.js"></script>
  <script src="js/agents/LocalAgent.js"></script>
  <script src="js/updateParser.js"></script>
  <script src="panel.js"></script>
</body>
</html>
